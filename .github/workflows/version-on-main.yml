name: Version on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: version-on-main
  cancel-in-progress: false

jobs:
  bump-version:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COMMITIZEN_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Commitizen
        run: python -m pip install --upgrade pip commitizen

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump versions and create a tag
        run: cz bump --changelog --no-verify --yes --check-consistency --annotated-tag

      - name: Push bump commit and tag
        run: git push origin HEAD:main --follow-tags
