name: Publish on release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: lts/*
          registry-url: https://npm.pkg.github.com
          scope: "@mhvelplund"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure the release tag points to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Build publish artifacts
        run: pnpm exec nx run-many -t prune --outputStyle=static

      - name: Normalize CLI publish artifacts
        run: node tools/prepare-cli-publish-packages.mjs

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --dir libs/syllables-core publish --no-git-checks
          pnpm --dir libs/synthetic-language-core publish --no-git-checks
          pnpm --dir apps/syllables-cli/dist publish --no-git-checks
          pnpm --dir apps/syllable-map-cli/dist publish --no-git-checks
          pnpm --dir apps/synthetic-language-cli/dist publish --no-git-checks
