# Apply these hooks to the 'backend' folder specifically
default_stages:
  - pre-commit
  - pre-push

repos:
  # --- General File Hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-ast # Simply checks if python files parse

  # --- Security & Deep Scans (Runs only on Push) ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "backend"]
        stages: [pre-push]

  # --- Node.js (Prettier & ESLint) ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        # Optional: only run on specific extensions
        types_or: [javascript, jsx, ts, tsx, css, scss, json]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v10.1.0
    hooks:
      - id: eslint
        files: ^frontend/
        args: [--fix]
        # Ensure ESLint has the necessary plugins (React/Typescript)
        additional_dependencies:
          - eslint@8.56.0
          - eslint-plugin-react@latest
          - eslint-plugin-react-hooks@latest
          - "@typescript-eslint/eslint-plugin@latest"
          - "@typescript-eslint/parser@latest"
